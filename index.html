<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolIMG: Free Online AI OCR & Image Scanning Hub</title>
    <meta name="description" content="ToolIMG is a premium, free online AI OCR and image utility hub. Instantly extract text, convert handwriting, read tables to Excel, scan receipts, decode barcodes, scan business cards, translate images and read vehicle license plates with precision." />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --primary-light: #eef2ff;
        --secondary: #06b6d4;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --bg-main: #ffffff;
        --bg-sub: #f8fafc;
        --border: #e2e8f0;
        --success: #10b981;
        --success-hover: #0e9d6d;
        --error: #f43f5e;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        --radius-lg: 1rem;
        --radius-xl: 1.5rem;
        --radius-full: 9999px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      h1, h2, h3, h4 {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        line-height: 1.25;
        color: var(--text-main);
      }

      .container {
        max-width: 1140px;
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      /* Navbar */
      .navbar {
        border-bottom: 1px solid var(--border);
        background: var(--bg-main);
        position: sticky;
        top: 0;
        z-index: 50;
        padding: 1rem 0;
      }

      .navbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo-link {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
        color: var(--text-main);
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.5rem;
      }

      .logo-img {
        height: 2.25rem;
        width: auto;
        object-fit: contain;
      }

      .logo-text {
        letter-spacing: -0.025em;
      }

      .logo-badge {
        background: var(--primary-light);
        color: var(--primary);
        font-size: 0.75rem;
        padding: 0.125rem 0.5rem;
        border-radius: var(--radius-full);
        font-weight: 600;
      }

      /* Hero Section */
      .hero {
        text-align: center;
        padding: 3.5rem 0 2.5rem 0;
      }

      .hero h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        letter-spacing: -0.03em;
      }

      .hero h1 span {
        color: var(--primary);
      }

      .hero p {
        font-size: 1.125rem;
        color: var(--text-muted);
        max-width: 650px;
        margin: 0 auto 2rem auto;
      }

      /* Interactive Search & Filters */
      .search-box {
        max-width: 550px;
        margin: 0 auto 2rem auto;
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        width: 1.25rem;
        height: 1.25rem;
      }

      .search-input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 3rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        font-size: 1rem;
        outline: none;
        background: var(--bg-sub);
        transition: all 0.2s ease;
      }

      .search-input:focus {
        background: var(--bg-main);
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-light);
      }

      .filter-tabs {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 2.5rem;
      }

      .filter-tab {
        border: none;
        padding: 0.5rem 1.25rem;
        border-radius: var(--radius-full);
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        background: var(--bg-sub);
        color: var(--text-muted);
        transition: all 0.2s ease;
      }

      .filter-tab:hover {
        background: var(--border);
        color: var(--text-main);
      }

      .filter-tab.active {
        background: var(--primary);
        color: var(--bg-main);
        box-shadow: var(--shadow-md);
      }

      /* Grid and Cards */
      .tools-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1.5rem;
        margin-bottom: 5rem;
      }

      .tool-card {
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 1.5rem;
        cursor: pointer;
        transition: all 0.25s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        text-decoration: none;
        color: inherit;
      }

      .tool-card:hover {
        border-color: var(--primary-light);
        box-shadow: var(--shadow-xl);
        transform: translateY(-4px);
      }

      .tool-icon-wrapper {
        width: 3rem;
        height: 3rem;
        border-radius: var(--radius-lg);
        background: var(--primary-light);
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.25rem;
        transition: all 0.2s ease;
      }

      .tool-card:hover .tool-icon-wrapper {
        background: var(--primary);
        color: var(--bg-main);
        transform: scale(1.05);
      }

      .tool-icon-wrapper svg {
        width: 1.5rem;
        height: 1.5rem;
      }

      .tool-card h2 {
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
        transition: color 0.2s ease;
      }

      .tool-card:hover h2 {
        color: var(--primary);
      }

      .tool-card p {
        font-size: 0.875rem;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 1.5rem;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .tool-cta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--secondary);
        margin-top: auto;
      }

      .tool-card:hover .tool-cta {
        color: var(--primary);
      }

      .tool-cta svg {
        width: 1rem;
        height: 1rem;
        transition: transform 0.2s ease;
      }

      .tool-card:hover .tool-cta svg {
        transform: translateX(3px);
      }

      /* Marketing Content */
      .marketing-section {
        background: var(--bg-sub);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 3rem 2rem;
        margin-bottom: 5rem;
      }

      .marketing-inner {
        max-width: 800px;
        margin: 0 auto;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        background: var(--primary-light);
        color: var(--primary);
        padding: 0.25rem 0.75rem;
        border-radius: var(--radius-full);
        font-size: 0.75rem;
        font-weight: 600;
        margin-bottom: 1.25rem;
      }

      .badge svg {
        width: 0.875rem;
        height: 0.875rem;
      }

      .marketing-section h2 {
        font-size: 1.75rem;
        margin-bottom: 1rem;
      }

      .marketing-section p {
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1.5rem;
      }

      .feature-item {
        display: flex;
        gap: 0.75rem;
        align-items: start;
      }

      .feature-check {
        width: 1.25rem;
        height: 1.25rem;
        border-radius: var(--radius-full);
        background: #ecfdf5;
        color: var(--success);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 0.125rem;
      }

      .feature-check svg {
        width: 0.75rem;
        height: 0.75rem;
      }

      .feature-content h3 {
        font-size: 1rem;
        margin-bottom: 0.25rem;
      }

      .feature-content p {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin: 0;
      }

      /* FAQ Accordion */
      .faq-section {
        max-width: 800px;
        margin: 0 auto 5rem auto;
      }

      .faq-title {
        text-align: center;
        margin-bottom: 2rem;
      }

      .faq-title h2 {
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
      }

      .faq-title p {
        color: var(--text-muted);
      }

      .faq-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .faq-card {
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .faq-trigger {
        width: 100%;
        padding: 1.25rem 1.5rem;
        background: none;
        border: none;
        text-align: left;
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .faq-trigger:hover {
        background: var(--bg-sub);
      }

      .faq-trigger svg {
        width: 1.25rem;
        height: 1.25rem;
        color: var(--text-muted);
        transition: transform 0.2s ease;
      }

      .faq-card.open .faq-trigger svg {
        transform: rotate(180deg);
        color: var(--primary);
      }

      .faq-content {
        padding: 0 1.5rem 1.25rem 1.5rem;
        color: var(--text-muted);
        font-size: 0.875rem;
        line-height: 1.6;
        display: none;
        border-top: 1px solid var(--border);
        padding-top: 1rem;
        background: var(--bg-sub);
      }

      .faq-card.open .faq-content {
        display: block;
      }

      /* Footer */
      .footer {
        border-top: 1px solid var(--border);
        padding: 3rem 0;
        background: var(--bg-sub);
        text-align: center;
      }

      .footer p {
        font-size: 0.875rem;
        color: var(--text-muted);
      }

      /* Back Button */
      .back-btn-wrapper {
        margin-bottom: 1.5rem;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        background: var(--bg-sub);
        border-radius: var(--radius-lg);
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-muted);
        text-decoration: none;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .back-btn:hover {
        background: var(--primary-light);
        color: var(--primary);
        border-color: var(--primary-light);
      }

      .back-btn svg {
        width: 1rem;
        height: 1rem;
      }

      /* Tool Page Layout */
      .tool-header {
        margin-bottom: 2.5rem;
      }

      .tool-header h1 {
        font-size: 2.25rem;
        margin-bottom: 0.5rem;
      }

      .tool-header p {
        font-size: 1.125rem;
        color: var(--text-muted);
        max-width: 800px;
      }

      .workspace-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2rem;
        margin-bottom: 4rem;
      }

      @media (min-width: 992px) {
        .workspace-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .panel {
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 1.75rem;
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
      }

      .panel-title {
        font-size: 1.125rem;
        font-weight: 700;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .panel-title svg {
        width: 1.25rem;
        height: 1.25rem;
        color: var(--primary);
      }

      /* Upload / Drop Area */
      .drop-zone {
        border: 2px dashed var(--border);
        border-radius: var(--radius-lg);
        padding: 2.5rem 1.5rem;
        text-align: center;
        background: var(--bg-sub);
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 220px;
      }

      .drop-zone:hover, .drop-zone.dragover {
        border-color: var(--primary);
        background: var(--primary-light);
      }

      .drop-icon-circle {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: var(--radius-full);
        background: var(--primary-light);
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
      }

      .drop-zone:hover .drop-icon-circle {
        background: var(--primary);
        color: var(--bg-main);
      }

      .drop-icon-circle svg {
        width: 1.5rem;
        height: 1.5rem;
      }

      .drop-zone h3 {
        font-size: 1rem;
        margin-bottom: 0.25rem;
      }

      .drop-zone h3 span {
        color: var(--primary);
      }

      .drop-zone p {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .file-preview-container {
        position: relative;
        max-width: 100%;
        max-height: 240px;
        border-radius: var(--radius-lg);
        overflow: hidden;
        border: 1px solid var(--border);
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .file-preview-img {
        max-height: 240px;
        max-width: 100%;
        object-fit: contain;
      }

      .file-preview-overlay {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        opacity: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s ease;
      }

      .file-preview-container:hover .file-preview-overlay {
        opacity: 1;
      }

      .replace-badge {
        background: var(--primary);
        color: var(--bg-main);
        padding: 0.375rem 0.875rem;
        border-radius: var(--radius-full);
        font-size: 0.75rem;
        font-weight: 600;
      }

      .extra-options-box {
        background: var(--primary-light);
        border: 1px solid rgba(79, 70, 229, 0.1);
        border-radius: var(--radius-lg);
        padding: 1rem;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .options-label {
        font-size: 0.875rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.375rem;
      }

      .options-label svg {
        width: 1.125rem;
        height: 1.125rem;
        color: var(--primary);
      }

      .select-dropdown {
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 0.375rem 0.75rem;
        font-size: 0.875rem;
        outline: none;
        cursor: pointer;
        font-weight: 500;
      }

      .select-dropdown:focus {
        border-color: var(--primary);
      }

      .action-buttons {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      .btn {
        border: none;
        outline: none;
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius-lg);
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background: var(--primary);
        color: var(--bg-main);
        flex: 1;
        box-shadow: var(--shadow-md);
      }

      .btn-primary:hover {
        background: var(--primary-hover);
        box-shadow: var(--shadow-lg);
      }

      .btn-secondary {
        background: var(--bg-sub);
        border: 1px solid var(--border);
        color: var(--text-muted);
      }

      .btn-secondary:hover {
        background: var(--border);
        color: var(--text-main);
      }

      /* Tips Box */
      .tips-box {
        background: var(--bg-sub);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
        margin-top: 1.5rem;
      }

      .tips-box h4 {
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.375rem;
      }

      .tips-box h4 svg {
        width: 1.125rem;
        height: 1.125rem;
        color: var(--success);
      }

      .tips-list {
        list-style-type: none;
        font-size: 0.8125rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
      }

      .tips-list li {
        display: flex;
        gap: 0.375rem;
      }

      .tips-list li::before {
        content: "•";
        color: var(--success);
        font-weight: bold;
      }

      /* Results Panel Details */
      .results-placeholder {
        text-align: center;
        padding: 4rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        min-height: 380px;
      }

      .results-placeholder-icon {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: var(--radius-full);
        background: var(--bg-sub);
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
      }

      .results-placeholder-icon svg {
        width: 1.5rem;
        height: 1.5rem;
      }

      .results-placeholder h3 {
        font-size: 1.125rem;
        margin-bottom: 0.25rem;
      }

      .results-placeholder p {
        font-size: 0.875rem;
        color: var(--text-muted);
        max-width: 320px;
        line-height: 1.5;
      }

      /* Processing Loading */
      .processing-view {
        text-align: center;
        padding: 4rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        min-height: 380px;
      }

      .spinner-wrapper {
        position: relative;
        margin-bottom: 1.5rem;
      }

      .spinner {
        width: 3.5rem;
        height: 3.5rem;
        border: 4px solid var(--primary-light);
        border-top-color: var(--primary);
        border-radius: var(--radius-full);
        animation: spin 1s linear infinite;
      }

      .spinner-icon {
        position: absolute;
        inset: 0;
        margin: auto;
        width: 1.25rem;
        height: 1.25rem;
        color: var(--primary);
        animation: pulse 1.5s ease-in-out infinite;
      }

      .processing-view h3 {
        font-size: 1.25rem;
        margin-bottom: 0.25rem;
      }

      .processing-view p {
        font-size: 0.875rem;
        color: var(--text-muted);
        max-width: 300px;
        margin-bottom: 1.5rem;
      }

      .processing-badge {
        background: var(--primary-light);
        color: var(--primary);
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.375rem 1rem;
        border-radius: var(--radius-full);
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
      }

      .processing-badge svg {
        width: 0.875rem;
        height: 0.875rem;
        animation: spin 2s linear infinite;
      }

      /* Tab Panels */
      .tabs-header {
        background: #f1f5f9;
        padding: 0.25rem;
        border-radius: 0.75rem;
        display: flex;
        margin-bottom: 1.25rem;
      }

      .tab-btn {
        flex: 1;
        border: none;
        outline: none;
        background: none;
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--text-muted);
        padding: 0.5rem 0.25rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .tab-btn.active {
        background: var(--bg-main);
        color: var(--primary);
        box-shadow: var(--shadow-sm);
      }

      .tab-actions {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
      }

      .icon-action-btn {
        border: 1px solid var(--border);
        background: var(--bg-main);
        color: var(--text-muted);
        border-radius: 0.5rem;
        width: 2.25rem;
        height: 2.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
      }

      .icon-action-btn:hover {
        color: var(--primary);
        background: var(--primary-light);
        border-color: var(--primary-light);
      }

      .icon-action-btn svg {
        width: 1.125rem;
        height: 1.125rem;
      }

      .btn-download-special {
        background: var(--success);
        color: var(--bg-main);
        border: none;
        border-radius: 0.5rem;
        padding: 0 0.75rem;
        font-size: 0.75rem;
        font-weight: 700;

      function triggerToast(message) {
        const toast = document.getElementById("app-toast");
        const toastMsg = document.getElementById("toast-message");
        toastMsg.textContent = message;
        toast.classList.add("show");
        setTimeout(() => {
          toast.classList.remove("show");
        }, 2000);
      }

      function getToolCategory(toolId) {
        if (["image-to-text", "handwriting", "pdf-to-text"].includes(toolId)) return "text";
        if (["receipt", "business-card", "license-plate"].includes(toolId)) return "document";
        if (["table", "translate", "barcode"].includes(toolId)) return "utility";
        return "other";
      }

      // 6. Router Mechanism
      function syncStateWithHash() {
        const hash = window.location.hash;
        if (hash.startsWith("#/tool/")) {
          const id = hash.replace("#/tool/", "");
          const found = TOOLS_DATA.find(t => t.id === id);
          if (found) {
            state.activeToolId = id;
            document.title = `${found.title} - Free Online AI OCR | ToolIMG`;
          } else {
            state.activeToolId = null;
            window.location.hash = "";
            document.title = "ToolIMG: Free Online AI OCR & Image Scanning Hub";
          }
        } else {
          state.activeToolId = null;
          document.title = "ToolIMG: Free Online AI OCR & Image Scanning Hub";
        }
        // Always reset processing and file on page routing
        state.uploadedFile = null;
        state.uploadedFileUrl = null;
        state.isProcessing = false;
        state.ocrResult = null;
        state.activeResultTab = "visual";
        
        renderApp();
      }

          actionButtonsHTML = `
            <div class="action-buttons">
              <button class="btn btn-primary" onclick="processOCR()" ${state.isProcessing ? 'disabled' : ''}>
                ${getSvgIcon("sparkles")}
                <span>${state.isProcessing ? 'Scanning Characters...' : 'Run OCR Scan'}</span>
              </button>
              <button class="btn btn-secondary" onclick="resetWorkspace()" ${state.isProcessing ? 'disabled' : ''}>Reset</button>
            </div>
          `;
        }

        // Right Column Result Panel HTML (Placeholder vs Spinner vs Result Output)
        let rightColumnResultHTML = "";
        if (state.isProcessing) {
          rightColumnResultHTML = `
            <div class="panel">
              <div class="processing-view">
                <div class="spinner-wrapper">
                  <div class="spinner"></div>
                  <div class="spinner-icon">
                    ${getSvgIcon("sparkles")}
                  </div>
                </div>
                <h3>Analyzing Image Layout</h3>
                <p>Decoding character angles, reconstructing grids, and compiling data coordinates.</p>
                <div class="processing-badge">
                  ${getSvgIcon("sparkles")}
                  <span>Processing takes ~1.5s...</span>
                </div>
              </div>
            </div>
          `;
        } else if (state.ocrResult) {
          // Special formatted blocks
          let visualRenderOutput = "";
          
          if (tool.id === "business-card" && state.ocrResult.structuredData.name) {
            const sd = state.ocrResult.structuredData;
            visualRenderOutput = `
              <div class="business-card-render">
                <div class="card-header-flex">
                  <div class="card-avatar">
                    ${getSvgIcon("user")}
                  </div>
                  <div class="card-title-details">
                    <h4>${sd.name}</h4>
                    <p>${sd.title || 'Contact'} at ${sd.company || 'Business'}</p>
                  </div>
                </div>
                <div class="card-rows">
                  ${sd.phone ? `<div class="card-row-item">${getSvgIcon("phone")} <span>${sd.phone}</span></div>` : ''}
                  ${sd.email ? `<div class="card-row-item">${getSvgIcon("mail")} <a href="mailto:${sd.email}">${sd.email}</a></div>` : ''}
                  ${sd.website ? `<div class="card-row-item">${getSvgIcon("globe")} <a href="https://${sd.website}" target="_blank">${sd.website}</a></div>` : ''}
                  ${sd.address ? `<div class="card-row-item">${getSvgIcon("map-pin")} <span>${sd.address}</span></div>` : ''}
                </div>
              </div>
            `;
          } else if (tool.id === "receipt" && state.ocrResult.structuredData.merchantName) {
            const sd = state.ocrResult.structuredData;
            visualRenderOutput = `
              <div class="receipt-render-box">
                <div class="receipt-header">
                  <div>
                    <div class="receipt-merchant">${sd.merchantName}</div>
                    <div class="receipt-date">Date: ${sd.date}</div>
                  </div>
                  <div>
                    <span class="receipt-badge">${sd.paymentMethod}</span>
                  </div>
                </div>
                <div class="receipt-item-list">
                  ${sd.items.map(item => `
                    <div class="receipt-item-row">
                      <span>${item.qty}x ${item.name}</span>
                      <span>${sd.currency}${item.total}</span>
                    </div>
                  `).join("")}
                </div>
                <div class="receipt-summary">
                  ${sd.taxAmount > 0 ? `<div class="receipt-item-row receipt-item-desc"><span>VAT/Tax:</span> <span>${sd.currency}${sd.taxAmount}</span></div>` : ''}
                  ${sd.tipAmount > 0 ? `<div class="receipt-item-row receipt-item-desc"><span>Tips:</span> <span>${sd.currency}${sd.tipAmount}</span></div>` : ''}
                  <div class="receipt-total-row">Total: ${sd.currency}${sd.totalAmount}</div>
                </div>
              </div>
            `;
          } else if (tool.id === "barcode" && state.ocrResult.structuredData.decodedValue) {
            const sd = state.ocrResult.structuredData;
            visualRenderOutput = `
              <div class="barcode-decode-box">
                ${getSvgIcon("qr-code")}
                <div class="barcode-symbology">Type: ${sd.codeType}</div>
                <div class="barcode-payload">${sd.decodedValue}</div>
                ${sd.isUrl 
                  ? `<a href="${sd.actionUrl}" target="_blank" class="barcode-action-link">Open Hyperlink Link ${getSvgIcon("external-link")}</a>` 
                  : `<a href="https://www.google.com/search?q=${encodeURIComponent(sd.decodedValue)}" target="_blank" class="barcode-action-link">Lookup Product Code ${getSvgIcon("external-link")}</a>`
                }
              </div>
            `;
          } else if (tool.id === "table" && state.ocrResult.structuredData.headers) {
            const sd = state.ocrResult.structuredData;
            visualRenderOutput = `
              <div class="table-render-container">
                <table class="ocr-data-table">
                  <thead>
                    <tr>
                      ${sd.headers.map(h => `<th>${h}</th>`).join("")}
                    </tr>
                  </thead>
                  <tbody>
                    ${sd.rows.map(row => `
                      <tr>
                        ${row.map(cell => `<td>${cell}</td>`).join("")}
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              </div>
            `;
          }

          // Markdown Parser simple conversion for results output formatting
          let formattedMarkdownHTML = state.ocrResult.markdownSummary
            .replace(/### (.*)/g, '<h3 style="font-size: 1.125rem; margin-top:1rem; margin-bottom: 0.5rem;">$1</h3>')
            .replace(/## (.*)/g, '<h2 style="font-size: 1.25rem; margin-top:1.25rem; margin-bottom: 0.5rem;">$1</h2>')
            .replace(/# (.*)/g, '<h1 style="font-size: 1.5rem; margin-top:1.5rem; margin-bottom: 0.75rem;">$1</h1>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/`([^`]+)`/g, '<code style="background:var(--bg-sub); padding:0.125rem 0.25rem; border-radius:0.25rem; font-family:\'JetBrains Mono\'">$1</code>')
            .replace(/> (.*)/g, '<blockquote style="border-left: 3px solid var(--primary); padding-left:0.75rem; color:var(--text-muted); margin-bottom:1rem;">$1</blockquote>')
            .replace(/\n\* (.*)/g, '<li>$1</li>')
            .replace(/<li>(.*)<\/li>/g, '<ul style="margin-left: 1.25rem; margin-bottom: 1rem;"><li>$1</li></ul>')
            .replace(/\n\n/g, '<p style="margin-bottom:0.75rem;"></p>');

          let activeTabBodyHTML = "";
          if (state.activeResultTab === "visual") {
            activeTabBodyHTML = `
              <div>
                ${visualRenderOutput}
                <div style="font-size: 0.875rem;">
                  ${formattedMarkdownHTML}
                </div>
              </div>
            `;
          } else if (state.activeResultTab === "text") {
            activeTabBodyHTML = `
              <pre class="results-pre">${state.ocrResult.extractedText}</pre>
            `;
          } else if (state.activeResultTab === "json") {
            activeTabBodyHTML = `
              <pre class="results-pre">${JSON.stringify(state.ocrResult, null, 2)}</pre>
            `;
          }

          // Rendering action buttons
          let specialDownloadBtnHTML = "";
          if (tool.id === "business-card" && state.ocrResult.structuredData.vcardText) {
            specialDownloadBtnHTML = `
              <button class="btn-download-special" onclick="downloadSpecialContact()">
                ${getSvgIcon("download")}
                <span>vCard</span>
              </button>
            `;
          } else if (tool.id === "table" && state.ocrResult.structuredData.rows) {
            specialDownloadBtnHTML = `
              <button class="btn-download-special" onclick="downloadSpecialCsv()">
                ${getSvgIcon("download")}
                <span>CSV Sheet</span>
              </button>
            `;
          }

          rightColumnResultHTML = `
            <div class="panel">
              <div class="tabs-header">
                <button class="tab-btn ${state.activeResultTab === 'visual' ? 'active' : ''}" onclick="updateResultTab('visual')">Visual Render</button>
                <button class="tab-btn ${state.activeResultTab === 'text' ? 'active' : ''}" onclick="updateResultTab('text')">Raw Text</button>
                <button class="tab-btn ${state.activeResultTab === 'json' ? 'active' : ''}" onclick="updateResultTab('json')">JSON Data</button>
              </div>

              <div class="tab-actions">
                <button class="icon-action-btn" onclick="copyResultText()" title="Copy entire text">
                  ${getSvgIcon("copy")}
                </button>
                <button class="icon-action-btn" onclick="downloadTxtFile()" title="Download text file">
                  ${getSvgIcon("download")}
                </button>
                ${specialDownloadBtnHTML}
              </div>

              <div class="results-body">
                ${activeTabBodyHTML}
              </div>
            </div>
          `;
        } else {
          rightColumnResultHTML = `
            <div class="panel" style="justify-content: center;">
              <div class="results-placeholder">
                <div class="results-placeholder-icon">
                  ${getSvgIcon("file-text")}
                </div>
                <h3>OCR Output Panel</h3>
                <p>Prepare your source file, click 'Run OCR Scan', and view digitized parameters instantly.</p>
              </div>
            </div>
          `;
        }

        // Features Grid specific to this tool
        let toolFeaturesHTML = `
          <section class="marketing-section" style="padding: 2.5rem 2rem;">
            <div class="marketing-inner" style="max-width: 900px;">
              <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Premium Features of ${tool.title}</h2>
              <p style="margin-bottom: 2rem;">Discover why developers and businesses trust ToolIMG for processing assets.</p>
              <div class="features-grid" style="grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem;">
                ${tool.features.map(f => `
                  <div class="feature-item">
                    <div class="feature-check" style="background:var(--primary-light); color:var(--primary);">
                      ${getSvgIcon("sparkles")}
                    </div>
                    <div class="feature-content">
                      <h3 style="font-size: 0.95rem; font-weight: 700; margin-bottom: 0.25rem;">${f.title}</h3>
                      <p style="font-size: 0.8125rem;">${f.description}</p>
                    </div>
                  </div>
                `).join("")}
              </div>
            </div>
          </section>
        `;

        // Tool-specific FAQs Accordion list
        let toolFaqsHTML = `
          <section class="faq-section" style="margin-bottom: 4rem;">
            <div class="faq-title">
              <h2>FAQs about ${tool.title}</h2>
              <p>Learn more about how to get high accuracy output sheets.</p>
            </div>
            <div class="faq-list">
              ${tool.faqs.map((faq, index) => {
                const isOpen = state.openToolFaqIndex === index;
                return `
                  <div class="faq-card ${isOpen ? 'open' : ''}">
                    <button class="faq-trigger" onclick="toggleToolFaq(${index})">
                      <span>${faq.question}</span>
                      ${getSvgIcon("chevron-down")}
                    </button>
                    <div class="faq-content">
                      ${faq.answer}
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </section>
        `;

        return `
          <div class="container" style="padding-top: 1.5rem;">
            <!-- Back navigation button link -->
            <div class="back-btn-wrapper">
              <a href="#/" class="back-btn">
                ${getSvgIcon("arrow-left")}
                <span>Go Back to Homepage</span>
              </a>
            </div>

            <!-- Page Title Header -->
            <div class="tool-header">
              <h1>${tool.h1}</h1>
              <p>${tool.seoDescription}</p>
            </div>

            <!-- Primary Workspace Matrix -->
            <div class="workspace-grid">
              
              <!-- Left Prep Column -->
              <div class="panel">
                <div class="panel-title">
                  ${getSvgIcon("upload")}
                  <span>Image Workspace</span>
                </div>

                ${optionTranslateHTML}

                <!-- Drag zone area container -->
                ${dropzoneHTML}

                <!-- Hidden file selector link -->
                <input type="file" id="workspace-file-selector" style="display: none;" accept="image/*" onchange="handleFileSelected(this)" />

                ${actionButtonsHTML}

                <!-- General Help Guidelines -->
                <div class="tips-box">
                  <h4>
                    ${getSvgIcon("check")}
                    Tips for Flawless Scans:
                  </h4>
                  <ul class="tips-list">
                    <li><strong>Maximize contrast:</strong> Avoid shadows, dark filters, or dim lights.</li>
                    <li><strong>Keep Aligned:</strong> Flatten document corners and align text rows horizontally.</li>
                    <li><strong>Focus Quality:</strong> Crop or reshoot blurry screenshots to improve precision.</li>
                  </ul>
                </div>
              </div>

              <!-- Right Results Column -->
              ${rightColumnResultHTML}

            </div>

            <!-- Tool Specific Promotional Details -->
            ${toolFeaturesHTML}

            <!-- Tool Specific FAQ List -->
            ${toolFaqsHTML}

          </div>
        `;
      }

      // Main application orchestrator viewport updater
      function renderApp() {
        const appViewport = document.getElementById("app-viewport");
        
        if (state.activeToolId) {
          appViewport.innerHTML = renderToolPage();
          setupWorkspaceDragEvents();
        } else {
          appViewport.innerHTML = renderHomepage();
        }
      }

      // 8. Controller Actions / Event Listeners

      // Navigation & Searching
      window.updateSearch = function(val) {
        state.searchQuery = val;
        // Re-render homepage with the updated search queries
        if (!state.activeToolId) {
          const appViewport = document.getElementById("app-viewport");
          appViewport.innerHTML = renderHomepage();
        }
      };

      window.updateCategory = function(cat) {
        state.activeCategory = cat;
        renderApp();
      };

      window.resetSearchFilters = function() {
        state.searchQuery = "";
        state.activeCategory = "all";
        renderApp();
      };

      // General Accordion FAQ collapse triggers
      window.toggleGeneralFaq = function(index) {
        state.openGeneralFaqIndex = (state.openGeneralFaqIndex === index) ? null : index;
        renderApp();
      };

      // Tool Specific Accordion FAQ collapse triggers
      window.toggleToolFaq = function(index) {
        state.openToolFaqIndex = (state.openToolFaqIndex === index) ? null : index;
        renderApp();
      };

      // Extra Translation Dropdown state updates
      window.updateTargetLanguage = function(lang) {
        state.targetLanguage = lang;
      };

      // Result Panel Tab controller transitions
      window.updateResultTab = function(tab) {
        state.activeResultTab = tab;
        renderApp();
      };

      // Upload triggers
      window.triggerFileInput = function() {
        document.getElementById("workspace-file-selector").click();
      };

      window.handleFileSelected = function(input) {
        const files = input.files;
        if (files && files.length > 0) {
          validateAndSetFile(files[0]);
        }
      };

      function validateAndSetFile(file) {
        if (!file.type.startsWith("image/")) {
          alert("Only PNG, JPEG, JPG and WEBP image files are supported.");
          return;
        }
        state.uploadedFile = file;
        state.uploadedFileUrl = URL.createObjectURL(file);
        state.ocrResult = null;
        state.isProcessing = false;
        
        renderApp();
      }

      // Reset workspace
      window.resetWorkspace = function() {
        state.uploadedFile = null;
        state.uploadedFileUrl = null;
        state.ocrResult = null;
        state.isProcessing = false;
        state.activeResultTab = "visual";
        renderApp();
      };

      // Helper to convert file to base64
      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => {
            const result = reader.result;
            const base64Str = result.split(',')[1];
            resolve(base64Str);
          };
          reader.onerror = error => reject(error);
        });
      }

      // Process OCR using backend API
      window.processOCR = async function() {
        if (!state.uploadedFile) return;

        state.isProcessing = true;
        renderApp();

        try {
          const base64Data = await fileToBase64(state.uploadedFile);
          
          // Use Vercel backend if hosted externally, otherwise use relative endpoint
          const apiEndpoint = window.location.hostname === 'localhost' || 
                              window.location.hostname === '127.0.0.1' || 
                              window.location.hostname.includes('run.app')
            ? '/api/ocr'
            : 'https://toolimg-ocr.vercel.app/api/ocr';

          const response = await fetch(apiEndpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              toolId: state.activeToolId,
              fileName: state.uploadedFile.name,
              mimeType: state.uploadedFile.type,
              targetLanguage: state.targetLanguage,
              base64Data: base64Data
            })
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
          }

          state.ocrResult = await response.json();
        } catch (err) {
          console.error("OCR Scan failed", err);
          alert(`OCR Scan failed: ${err.message || 'Unknown error'}`);
        } finally {
          state.isProcessing = false;
          renderApp();
        }
      };

      // Clipboard Action
      window.copyResultText = function() {
        if (!state.ocrResult) return;
        navigator.clipboard.writeText(state.ocrResult.extractedText)
          .then(() => {
            triggerToast("Copied to clipboard!");
          })
          .catch(() => {
            alert("Clipboard permission rejected.");
          });
      };

      // Download standard text document file
      window.downloadTxtFile = function() {
        if (!state.ocrResult) return;
        downloadBlob(state.ocrResult.extractedText, "extracted-ocr-text.txt", "text/plain");
      };

      // Download vCard RFC-compliant file
      window.downloadSpecialContact = function() {
        if (!state.ocrResult || !state.ocrResult.structuredData.vcardText) return;
        downloadBlob(state.ocrResult.structuredData.vcardText, "contact-profile.vcf", "text/vcard");
      };

      // Download CSV spreadsheet sheet
      window.downloadSpecialCsv = function() {
        if (!state.ocrResult || !state.ocrResult.structuredData.rows) return;
        const sd = state.ocrResult.structuredData;
        
        const csvRows = [
          sd.headers.map(h => `"${h.replace(/"/g, '""')}"`).join(","),
          ...sd.rows.map(row => row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(","))
        ].join("\n");

        downloadBlob(csvRows, "ocr-excel-table.csv", "text/csv");
      };

      function downloadBlob(content, filename, contentType) {
        const blob = new Blob([content], { type: contentType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        triggerToast(`Downloaded ${filename}!`);
      }

      // Drag over event setup function
      function setupWorkspaceDragEvents() {
        const dropZone = document.getElementById("drop-zone-area");
        if (!dropZone) return;

        ["dragenter", "dragover"].forEach(eventName => {
          dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add("dragover");
          }, false);
        });

        ["dragleave", "drop"].forEach(eventName => {
          dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove("dragover");
          }, false);
        });

        dropZone.addEventListener("drop", (e) => {
          const dt = e.dataTransfer;
          const files = dt.files;
          if (files && files.length > 0) {
            validateAndSetFile(files[0]);
          }
        }, false);
      }

      // Handle direct click on logo to reset
      document.getElementById("logo-anchor").addEventListener("click", () => {
        state.searchQuery = "";
        state.activeCategory = "all";
      });

      // Listen on hash changes to sync routers
      window.addEventListener("hashchange", syncStateWithHash);

      // 9. Initial Load Setup
      syncStateWithHash();
    </script>
  </body>
</html>
