      const OperationType = {
        CREATE: 'create',

      function handleFirestoreError(error, operationType, path, shouldThrow = true) {
        let errMessage = "Unknown error";
        if (error && error.message) {
          errMessage = error.message;
        } else if (error instanceof Error) {
          errMessage = error.message;
        } else {
          errMessage = String(error);
        }

        const errInfo = {
          error: errMessage,
          authInfo: {
            userId: auth?.currentUser?.uid || null,
            email: auth?.currentUser?.email || null,
            emailVerified: auth?.currentUser?.emailVerified || null,
            isAnonymous: auth?.currentUser?.isAnonymous || null,
            tenantId: auth?.currentUser?.tenantId || null,
            providerInfo: auth?.currentUser?.providerData?.map(provider => ({
              providerId: provider.providerId,
              email: provider.email,
            })) || []
          },
          operationType,
          path
        };

        let serialized = "";
        try {
          serialized = JSON.stringify(errInfo);
        } catch (e) {
          serialized = JSON.stringify({
            error: errMessage,
            serialization_failed: true,
            operationType,
            path
          });
        }

        console.error('Firestore Error: ', serialized);
        if (shouldThrow) {
          throw new Error(serialized);
        }
      }

      // main render function
      function renderApp() {
        const appViewport = document.getElementById("app-viewport");
        if (!appViewport) return;

        renderNavbarAuth();

          appViewport.innerHTML = renderDashboardPage();
        } else if (state.activePage === "pricing") {
          appViewport.innerHTML = renderPricingPage();
        } else {
          appViewport.innerHTML = renderWorkspace();
          setupWorkspaceDragEvents();
        }
      }

      // 7. Event Handler Actions

      window.updateSelectedFramework = function(val) {
        state.selectedFramework = val;
      };

      window.updateSelectedStyleTheme = function(val) {
        state.selectedStyleTheme = val;
      };

      window.updateSelectedInteractivity = function(val) {
        state.selectedInteractivity = val;
      };

      window.updateCustomPrompt = function(val) {
        state.customPrompt = val;
      };

      window.toggleFaqIndex = function(index) {
        if (state.openToolFaqIndex === index) {
          state.openToolFaqIndex = null;
        } else {
          state.openToolFaqIndex = index;
        }
        renderApp();
      };

      window.updateResultTab = function(val) {
        state.activeResultTab = val;
        renderApp();
      };

      window.updatePreviewMode = function(val) {
        state.previewMode = val;
        renderApp();

      window.openIframeInNewTab = function() {
        if (!state.ocrResult || !state.ocrResult.htmlCode) return;
        const blob = new Blob([state.ocrResult.htmlCode], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank");
      };

      window.triggerFileInput = function() {
        const fileSelector = document.getElementById("workspace-file-selector");
        if (fileSelector) fileSelector.click();
      };

      window.handleFileSelected = function(input) {
        const files = input.files;
        if (files && files.length > 0) {
          validateAndSetFile(files[0]);
        }
      };

      function validateAndSetFile(file) {
        if (!file.type.startsWith("image/")) {
          alert("Only PNG, JPEG, JPG and WEBP image files are supported.");
          return;
        }
        state.uploadedFile = file;
        state.uploadedFileUrl = URL.createObjectURL(file);
        state.ocrResult = null;
        state.isProcessing = false;
        renderApp();
      }

      window.resetWorkspace = function() {
        state.uploadedFile = null;
        state.uploadedFileUrl = null;
        state.ocrResult = null;
        state.isProcessing = false;
        state.activeResultTab = "visual";
        renderApp();
      };

      // Helper to convert file to base64
      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => {
            const result = reader.result;
            const base64Str = result.split(',')[1];
            resolve(base64Str);
          };
          reader.onerror = error => reject(error);
        });
      }

      // Convert visual screenshot/mockup image to code
      window.processImageToCode = async function() {
        if (!state.uploadedFile) return;

        // check credits limit
        if (state.currentUser) {
          if (state.credits === null || state.credits <= 0) {
            alert("You have run out of premium credits! Please purchase more credits on the pricing page to run conversions.");
            window.location.hash = "#/pricing";
            return;
          }
        }

        state.isProcessing = true;
        renderApp();

        try {
          const base64Data = await fileToBase64(state.uploadedFile);
          
          const response = await fetch('/api/ocr', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              fileName: state.uploadedFile.name,
              mimeType: state.uploadedFile.type,
              base64Data: base64Data,
              framework: state.selectedFramework,
              styleTheme: state.selectedStyleTheme,
              interactivity: state.selectedInteractivity,
              customPrompt: state.customPrompt
            })
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || `Failed to convert design to code (status: ${response.status})`);
          }

          state.ocrResult = await response.json();

          // deduct credit
          if (state.currentUser) {
            if (state.currentUser.uid === "guest_user") {
              state.credits = Math.max(0, state.credits - 1);
              localStorage.setItem("guest_credits", String(state.credits));
              triggerToast("Deducted 1 Credit for Conversion");
            } else {
              const userDocRef = doc(db, "users", state.currentUser.uid);
              try {
                await updateDoc(userDocRef, {
                  credits: increment(-1)
                });
                triggerToast("Deducted 1 Credit for Conversion");
              } catch (fsErr) {
                handleFirestoreError(fsErr, OperationType.UPDATE, `users/${state.currentUser.uid}`, false);
                state.credits = Math.max(0, (state.credits || 10) - 1);
                localStorage.setItem(`credits_${state.currentUser.uid}`, String(state.credits));
                triggerToast("Deducted 1 Credit (Offline Fallback)");
              }
            }
          }
        } catch (err) {
          console.error("Layout generation failed: " + (err ? (err.message || String(err)) : ""));
          alert(`Layout generation failed: ${err.message || 'Unknown error occurred.'}`);
        } finally {
          state.isProcessing = false;
          renderApp();
        }
      };

      window.copyGeneratedCode = function() {
        if (!state.ocrResult) return;
        navigator.clipboard.writeText(state.ocrResult.frameworkCode)
          .then(() => triggerToast("Copied code to clipboard!"))
          .catch(() => alert("Failed to write to clipboard."));
      };

      window.downloadGeneratedCodeFile = function() {
        if (!state.ocrResult) return;
        const code = state.ocrResult.frameworkCode;
        let ext = "html";
        if (state.selectedFramework === "react-tailwind") ext = "jsx";
        else if (state.selectedFramework === "vue-tailwind") ext = "vue";
        
        const blob = new Blob([code], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `converted-layout.${ext}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        triggerToast("Download triggered!");
      };

      function setupWorkspaceDragEvents() {
        const dropZone = document.getElementById("drop-zone-area");
        if (!dropZone) return;

        ["dragenter", "dragover"].forEach(eventName => {
          dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add("bg-indigo-50/40", "border-indigo-500");
          }, false);
        });

        ["dragleave", "drop"].forEach(eventName => {
          dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove("bg-indigo-50/40", "border-indigo-500");
          }, false);
        });

        dropZone.addEventListener("drop", (e) => {
          const dt = e.dataTransfer;
          const files = dt.files;
          if (files && files.length > 0) {
            validateAndSetFile(files[0]);
          }
        }, false);
      }

      // logo navigation reset
      document.getElementById("logo-anchor").addEventListener("click", () => {
        state.customPrompt = "";
      });

      // listen to hash route transitions
      window.addEventListener("hashchange", syncStateWithHash);

      // --- Firebase Auth & DB setups ---
      let app, auth, db, googleProvider;

      async function getFirebaseConfig() {
        try {
          const res = await fetch('/api/config');
          if (res.ok) {
            const data = await res.json();
            if (data.apiKey) return data;
          }
        } catch (err) {
          console.warn("Falling back to static config: " + (err ? (err.message || String(err)) : ""));
        }
        return {
          apiKey: "AIzaSyCFyGzp7viV1tq25DAMnpKKSJpPngtVa14",
          authDomain: "gen-lang-client-0844549707.firebaseapp.com",
          projectId: "gen-lang-client-0844549707",
          firestoreDatabaseId: "ai-studio-toolimg-a40860b9-3db9-4eab-a65f-f070e159a9b3",
          storageBucket: "gen-lang-client-0844549707.firebasestorage.app",
          messagingSenderId: "845800015860",
          appId: "1:845800015860:web:a6229be704605991785ba1"
        };
      }

      window.handleLogin = async function() {
        if (!auth) return alert("Firebase still initializing...");
        try {
          const result = await signInWithPopup(auth, googleProvider);
          triggerToast(`Welcome ${result.user.displayName || 'User'}!`);
        } catch (err) {
          console.error("Login error: " + (err ? (err.message || String(err)) : ""));
          if (err.code === "auth/popup-blocked") {
            alert("Popup blocked! Enable popups, open this page in a new browser window/tab, or click 'Guest Mode' to login instantly!");
          } else if (err.code === "auth/popup-closed-by-user") {
            triggerToast("Login cancelled. You can also try 'Guest Mode'!");
          } else {
            alert(`Login error: ${err.message}. Try using 'Guest Mode' as a seamless alternative.`);
          }
        }
      };

      window.handleGuestLogin = function() {
        const joined = new Date().toISOString();
        const guestUser = {
          uid: "guest_user",
          displayName: "Guest Demo User",
          photoURL: "",
          email: "guest@example.com"
        };
        localStorage.setItem("guest_user", JSON.stringify(guestUser));
        localStorage.setItem("guest_credits", "10");
        localStorage.setItem("guest_joined", joined);
        
        state.currentUser = guestUser;
        state.credits = 10;
        state.joinedAt = joined;
        
        triggerToast("Logged in as Guest!");

      window.handleLogout = async function() {
        try {
          if (state.currentUser && state.currentUser.uid === "guest_user") {
            localStorage.removeItem("guest_user");
            localStorage.removeItem("guest_credits");
            localStorage.removeItem("guest_joined");
            state.currentUser = null;
            state.credits = null;
            state.joinedAt = null;
            triggerToast("Logged out successfully");
            if (state.activePage === "dashboard") {
              window.location.hash = "#/";
            }
            renderApp();
            return;
          }
          if (auth) {
            await signOut(auth);
          }
          triggerToast("Logged out successfully");
          if (state.activePage === "dashboard") {
            window.location.hash = "#/";
          }
        } catch (err) {
          console.error("Logout error: " + (err ? (err.message || String(err)) : ""));
        }
      };

      let unsubscribeCredits = null;

      window.buyCredits = async function(price, creditsAmount) {
        if (!state.currentUser) return alert("Login is required to buy credit packets.");
        try {
          const amountInPaise = Math.round(price * 100);
          
          const response = await fetch('/api/create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: amountInPaise, currency: 'INR' })
          });
 
          if (!response.ok) throw new Error('Failed to create Razorpay order');
          const orderData = await response.json();
 
          const options = {
            key: orderData.keyId,
            amount: orderData.amount,
            currency: orderData.currency,
            name: "ToolIMG",
            description: `Buy ${creditsAmount} Credits`,
            image: "https://toolimg.online/blog/wp-content/uploads/2026/06/logo.png",
            order_id: orderData.orderId || orderData.order_id,
            handler: async function (response) {
              try {
                const verifyRes = await fetch('/api/verify-payment', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    razorpay_order_id: response.razorpay_order_id,
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_signature: response.razorpay_signature
                  })
                });
 
                if (!verifyRes.ok) throw new Error('Verification failed on server.');
                const verifyData = await verifyRes.json();
                
                if (verifyData.success) {
                  if (state.currentUser.uid === "guest_user") {
                    state.credits = (state.credits || 0) + creditsAmount;
                    localStorage.setItem("guest_credits", String(state.credits));
                    triggerToast(`Credited ${creditsAmount} Credits!`);
                    renderApp();
                  } else {
                    const userDocRef = doc(db, "users", state.currentUser.uid);
                    try {
                      await updateDoc(userDocRef, {
                        credits: increment(creditsAmount)
                      });
                      triggerToast(`Credited ${creditsAmount} Credits!`);
                    } catch (fsErr) {
                      handleFirestoreError(fsErr, OperationType.UPDATE, `users/${state.currentUser.uid}`, false);
                      state.credits = (state.credits || 10) + creditsAmount;
                      localStorage.setItem(`credits_${state.currentUser.uid}`, String(state.credits));
                      triggerToast(`Credited ${creditsAmount} Credits (Offline Fallback)!`);
                      renderApp();
                    }
                  }
                } else {
                  alert("Signature verification mismatch.");
                }
              } catch (verifyErr) {
                console.error("Verification error: " + (verifyErr ? (verifyErr.message || String(verifyErr)) : ""));
                alert("Payment verification failure: " + verifyErr.message);
              }
            },
            prefill: {
              name: state.currentUser.displayName || "",
              email: state.currentUser.email || ""
            },
            theme: { color: "#4f46e5" }
          };
 
          const rzp = new Razorpay(options);
          rzp.open();
        } catch (err) {
          console.error("Payment setup error: " + (err ? (err.message || String(err)) : ""));
          alert("Payment failed: " + err.message);
        }
      };

      async function initFirebase() {
        const config = await getFirebaseConfig();
        try {
          app = initializeApp(config);
          auth = getAuth(app);
          db = initializeFirestore(app, {
            experimentalForceLongPolling: true,
            useFetchStreams: false
          }, config.firestoreDatabaseId || "ai-studio-toolimg-a40860b9-3db9-4eab-a65f-f070e159a9b3");
          googleProvider = new GoogleAuthProvider();

          onAuthStateChanged(auth, async (user) => {
            if (unsubscribeCredits) {
              unsubscribeCredits();
              unsubscribeCredits = null;
            }

            if (user) {
              state.currentUser = user;
              const userDocRef = doc(db, "users", user.uid);
              try {
                let docSnap = null;
                try {
                  docSnap = await getDoc(userDocRef);
                } catch (fsErr) {
                  handleFirestoreError(fsErr, OperationType.GET, `users/${user.uid}`, false);
                }

                if (!docSnap || !docSnap.exists()) {
                  const joined = new Date().toISOString();
                  state.joinedAt = joined;
                  state.credits = 10;
                  try {
                    await setDoc(userDocRef, {
                      email: user.email || '',
                      displayName: user.displayName || '',
                      photoURL: user.photoURL || '',
                      joinedAt: joined,
                      credits: 10
                    });
                  } catch (fsErr) {
                    handleFirestoreError(fsErr, OperationType.CREATE, `users/${user.uid}`, false);
                    localStorage.setItem(`credits_${user.uid}`, "10");
                  }
                } else {
                  const data = docSnap.data();
                  state.joinedAt = data.joinedAt || new Date().toISOString();
                  state.credits = data.credits !== undefined ? data.credits : 10;
                }
              } catch (dbErr) {
                console.warn("Firestore initialization error, using local fallback: " + (dbErr ? (dbErr.message || String(dbErr)) : ""));
                state.credits = Number(localStorage.getItem(`credits_${user.uid}`) || "10");
                state.joinedAt = new Date().toISOString();
              }

              try {
                unsubscribeCredits = onSnapshot(userDocRef, (snap) => {
                  if (snap.exists()) {
                    const data = snap.data();
                    state.credits = data.credits !== undefined ? data.credits : 10;
                    renderApp();
                  }
                }, (error) => {
                  handleFirestoreError(error, OperationType.GET, `users/${user.uid}`, false);
                  if (state.credits === null) {
                    state.credits = Number(localStorage.getItem(`credits_${user.uid}`) || "10");
                    renderApp();
                  }
                });
              } catch (listenErr) {
                console.warn("Snapshot subscription failed: " + (listenErr ? (listenErr.message || String(listenErr)) : ""));
                if (state.credits === null) {
                  state.credits = Number(localStorage.getItem(`credits_${user.uid}`) || "10");
                }
              }
            } else {
              const guestUser = localStorage.getItem("guest_user");
              if (guestUser) {
                state.currentUser = JSON.parse(guestUser);
                state.credits = Number(localStorage.getItem("guest_credits") || "10");
                state.joinedAt = localStorage.getItem("guest_joined") || new Date().toISOString();
              } else {
                state.currentUser = null;
                state.credits = null;
                state.joinedAt = null;
              }
            }
            renderApp();
          });
        } catch (err) {
          console.error("Firebase init failed: " + (err ? (err.message || String(err)) : ""));
        }
      }

      // Initial execute loop
      syncStateWithHash();
      initFirebase();
    </script>
